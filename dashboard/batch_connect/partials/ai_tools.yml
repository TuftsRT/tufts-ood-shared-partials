num_cores:
  widget: "select"
  label: "Cores"
  options:
    - ["2", "2"]
    - ["4", "4"]
    - ["8", "8"]
    - ["12", "12"]
    - ["16", "16"]
  value: "8"

num_memory:
  widget: "select"
  label: "Memory"
  options:
    - ["4GB", "4"]
    - ["8GB", "8"]
    - ["16GB", "16"]
    - ["32GB", "32"]
    - ["64GB", "64"]
    - ["96GB", "96"]       
  value: "32"

partition:
  widget: "select"
  label: "Partition"
  help: "NOTE: jobs submitted to the preempt partition may get automatically killed to allow higher priority jobs to run"
  options:
    - ["preempt"]
    - ["gpu"]
  value: "gpu"

gpu_type:
  widget: "select"
  label: "GPU type"
  help: "gpu partition has a100, a100-80GB and p100, preempt partition has all listed gpu types."
  options:
    - ["Any","any"]
    - ["A100 - 40GB", "a100"]
    - ["A100 - 80GB", "a100-80GB"]
    - ["L40S - 48GB", "l40s"]
    - ["H200 - 140GB", "h200"]
    - ["RTX A5000", "rtx_a5000"] 
    - ["RTX A6000", "rtx_a6000"]
    - ["RTX 6000 ADA", "rtx_6000ada"]
  value: "l40s"